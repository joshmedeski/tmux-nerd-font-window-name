name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bashunit
        run: curl -s https://bashunit.typeddevs.com/install.sh | bash
      - name: Run tests
        run: ./lib/bashunit test/ --log-junit results.xml
      - name: Test report
        uses: dorny/test-reporter@v1
        # Skip for fork PRs which lack write permissions
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: bashunit
          path: results.xml
          reporter: java-junit
